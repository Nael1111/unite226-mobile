name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.3
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: app_messagerie_226
        run: flutter pub get

      - name: Build APK release
        working-directory: app_messagerie_226
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: unite226-release-${{ github.run_number }}
          path: app_messagerie_226/build/outputs/flutter-apk/app-release.apk
          retention-days: 30
