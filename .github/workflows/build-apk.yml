name: CI — Build APK + Deploy Web

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  # ─── Job 1 : APK Android ────────────────────────────────────────────────────
  build-apk:
    name: Build APK Android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.3
          channel: stable
          cache: true

      - name: Decode Keystore
        working-directory: app_messagerie_226
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Flutter pub get
        working-directory: app_messagerie_226
        run: flutter pub get

      - name: Build APK release
        working-directory: app_messagerie_226
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release --no-tree-shake-icons

      - name: Find APK
        run: find app_messagerie_226/build -name "*.apk" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: unite226-apk-${{ github.run_number }}
          path: app_messagerie_226/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ─── Job 2 : Angular Admin Web → Vercel ─────────────────────────────────────
  deploy-web:
    name: Deploy Angular Admin → Vercel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: admin-web
        run: npm install --legacy-peer-deps

      - name: Build Angular
        working-directory: admin-web
        env:
          NG_APP_FIREBASE_API_KEY: ${{ secrets.NG_APP_FIREBASE_API_KEY }}
          NG_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.NG_APP_FIREBASE_AUTH_DOMAIN }}
          NG_APP_FIREBASE_PROJECT_ID: ${{ secrets.NG_APP_FIREBASE_PROJECT_ID }}
          NG_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.NG_APP_FIREBASE_STORAGE_BUCKET }}
          NG_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NG_APP_FIREBASE_MESSAGING_SENDER_ID }}
          NG_APP_FIREBASE_APP_ID: ${{ secrets.NG_APP_FIREBASE_APP_ID }}
        run: npm run build

      - name: Deploy to Vercel
        working-directory: admin-web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel --legacy-peer-deps
          vercel deploy --prod --yes \
            --token "$VERCEL_TOKEN"
