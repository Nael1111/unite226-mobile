name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.3
          channel: stable
          cache: true

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
        working-directory: app_messagerie_226

      - name: Print SHA-1 (pour Firebase)
        run: |
          keytool -list -v \
            -keystore android/app/release.keystore \
            -alias ${{ secrets.KEY_ALIAS }} \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEY_PASSWORD }} 2>&1 | grep -E "SHA1|SHA256"
        working-directory: app_messagerie_226

      - name: Flutter pub get
        run: flutter pub get
        working-directory: app_messagerie_226

      - name: Build APK release
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release --no-tree-shake-icons
        working-directory: app_messagerie_226

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: unite226-release-${{ github.run_number }}
          path: app_messagerie_226/build/outputs/flutter-apk/app-release.apk
          retention-days: 30
